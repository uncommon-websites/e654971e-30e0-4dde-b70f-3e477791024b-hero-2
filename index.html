<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scottsdale Tree Trimming | Expert Palm Shaving & Tree Removal Specialists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-scale-in {
            opacity: 0;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-0 { animation-delay: 0ms; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }

        .text-balance { text-wrap: balance; }
        .text-pretty { text-wrap: pretty; }

        @media (prefers-reduced-motion: reduce) {
            .animate-fade-in-up, .animate-fade-in, .animate-scale-in {
                animation: none;
                opacity: 1;
                transform: none;
            }
        }

        /* Custom utility for the extremely tight tracking on the logo */
        .tracking-logo {
            letter-spacing: -0.08em;
        }
    </style>
</head>
<body class="antialiased bg-[#0a0a0a] text-white font-sans overflow-x-hidden selection:bg-white selection:text-black">

    <section class="relative h-screen w-full min-h-[600px] flex flex-col justify-between overflow-hidden">
        
        <!-- Background Image with Overlay -->
        <div class="absolute inset-0 z-0">
            <img 
                src="https://imolwncbqxugevwmleed.supabase.co/storage/v1/object/public/public-assets/hero-images/e654971e-30e0-4dde-b70f-3e477791024b/hero-2-img-0-1776484627204.png" 
                alt="Professional palm tree trimming and expert removal services in Scottsdale, Arizona" 
                class="w-full h-full object-cover animate-scale-in delay-0"
            />
            <!-- Gradient overlay to ensure text readability while keeping the image visible -->
            <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/20 to-black/50 animate-fade-in delay-100"></div>
        </div>

        <!-- Header / Navigation -->
        <header class="relative z-10 w-full px-6 md:px-12 pt-8 flex items-center justify-between animate-fade-in delay-100">
            <!-- Left: Hamburger Menu -->
            <button class="p-2 -ml-2 hover:opacity-70 transition-opacity duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-white rounded relative z-20" aria-label="Menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
                </svg>
            </button>

            <!-- Center: Navigation Links (Absolutely centered for perfect alignment) -->
            <nav class="hidden md:flex absolute left-1/2 -translate-x-1/2 items-center space-x-8 lg:space-x-10 text-[15px] tracking-wide">
                <a href="#" class="text-white/50 hover:text-white transition-colors duration-200">Home</a>
                <a href="#" class="text-white hover:text-white/70 transition-colors duration-200 uppercase text-xs font-bold tracking-widest">Palm Shaving</a>
                <a href="#" class="text-white hover:text-white/70 transition-colors duration-200 uppercase text-xs font-bold tracking-widest">Cactus Removal</a>
                <a href="#" class="text-white hover:text-white/70 transition-colors duration-200 uppercase text-xs font-bold tracking-widest">Xeriscaping</a>
                <a href="#" class="text-white hover:text-white/70 transition-colors duration-200 uppercase text-xs font-bold tracking-widest">Insurance</a>
                <a href="#" class="text-white hover:text-white/70 transition-colors duration-200 uppercase text-xs font-bold tracking-widest">Pricing</a>
            </nav>

            <!-- Right: Contact -->
            <a href="#" class="text-[15px] font-bold tracking-widest hover:opacity-70 transition-opacity duration-200 relative z-20">Call Now</a>
        </header>

        <!-- Middle Content: Slider Info & Line -->
        <div class="relative z-10 w-full px-6 md:px-12 flex items-center animate-fade-in-up delay-200">
            <div class="flex flex-col md:flex-row md:items-center space-y-4 md:space-y-0 md:space-x-10">
                <span class="text-base md:text-lg font-medium tracking-[0.3em] opacity-60">EST. 1998</span>
                <p class="text-sm md:text-base font-medium tracking-wide max-w-xl leading-relaxed text-pretty text-white/90">Scottsdale Tree Trimming delivers manicured, healthy landscapes via professional palm shaving, climate-aware pruning, and expert tree removal.</p>
            </div>
            
            <!-- Connecting Line -->
            <div class="h-[1px] bg-white/30 flex-grow mx-6 md:mx-10 hidden lg:block"></div>
            
            <a href="#" class="px-8 py-4 bg-[#2563eb] text-white rounded-sm text-sm font-bold tracking-widest uppercase hover:opacity-90 active:scale-[0.97] transition-all duration-200 flex items-center shadow-2xl">
                Get Free Estimate
            </a>
        </div>

        <!-- Bottom Content: Logo & Scroll Arrow -->
        <div class="relative z-10 w-full px-6 md:px-12 pb-6 md:pb-10 flex items-end justify-between animate-fade-in-up delay-300">
            <!-- Massive Logo -->
            <h1 class="text-[5rem] sm:text-[8rem] md:text-[11rem] lg:text-[14rem] leading-[0.75] font-black tracking-logo lowercase select-none -ml-1 md:-ml-2 text-balance leading-tight tracking-tight">
                trimming
            </h1>
            
            <!-- Scroll Down Arrow -->
            <button class="mb-2 md:mb-6 p-2 hover:opacity-70 hover:translate-y-2 transition-all duration-300 focus:outline-none" aria-label="Scroll down">
                <svg width="24" height="36" viewBox="0 0 24 36" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-6 h-9 md:w-8 md:h-12">
                    <path d="M12 0V34M12 34L5 27M12 34L19 27" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
                </svg>
            </button>
        </div>

    </section>

</body>
</html>
